<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super FM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }

        .header h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 0.9em;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            padding: 10px 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"],
        input[type="password"],
        input[type="file"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="file"]:focus,
        textarea:focus {
            border-color: #667eea;
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .story-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .story-item h3 {
            margin-bottom: 8px;
            color: #333;
        }

        .story-item p {
            color: #666;
            margin-bottom: 10px;
            word-break: break-all;
        }

        .story-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            flex: 1;
            padding: 8px;
            font-size: 0.9em;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }

        .subscription-alert {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
        }

        .subscription-alert button {
            margin-top: 10px;
            background: white;
            color: #ff6b6b;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📻 Super FM</h1>
            <p>Share Stories • Copy • Earn</p>
        </div>

        <div id="message-container"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('stories')">📖 Stories</button>
            <button class="tab-btn" onclick="switchTab('upload')">⬆️ Upload</button>
            <button class="tab-btn" onclick="switchTab('settings')">⚙️ Settings</button>
        </div>

        <div id="stories" class="tab-content active">
            <div id="subscription-check"></div>
            <div id="stories-list" class="loading">Loading stories...</div>
        </div>

        <div id="upload" class="tab-content">
            <div class="form-group">
                <label>Story Title</label>
                <input type="text" id="storyTitle" placeholder="Enter story title">
            </div>
            <div class="form-group">
                <label>Story Content</label>
                <textarea id="storyContent" placeholder="Write your story here..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="uploadStory()">📤 Upload Story</button>
        </div>

        <div id="settings" class="tab-content">
            <div class="form-group">
                <label>Your Channel/Group (for force sub)</label>
                <input type="text" id="channelLink" placeholder="@yourchannel">
            </div>
            <div class="form-group">
                <label>URL Shortener API Key</label>
                <input type="password" id="shortenerKey" placeholder="Your shortener.com API key">
            </div>
            <button class="btn btn-primary" onclick="saveSettings()">💾 Save Settings</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const API_URL = 'https://your-backend-url.com';
        let userID = null;

        const tg = window.Telegram.WebApp;
        tg.ready();

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userID = tg.initDataUnsafe.user.id;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'stories') {
                loadStories();
            }
        }

        function showMessage(text, type = 'info') {
            const msgContainer = document.getElementById('message-container');
            msgContainer.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
            setTimeout(() => {
                msgContainer.innerHTML = '';
            }, 3000);
        }

        async function checkSubscription() {
            try {
                const response = await fetch(`${API_URL}/api/check-subscription`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userID })
                });
                const data = await response.json();
                return data.subscribed;
            } catch (error) {
                return false;
            }
        }

        async function loadStories() {
            const list = document.getElementById('stories-list');
            list.innerHTML = '<div class="loading">Loading...</div>';

            try {
                const isSubscribed = await checkSubscription();
                
                if (!isSubscribed) {
                    document.getElementById('subscription-check').innerHTML = `
                        <div class="subscription-alert">
                            <p>Subscribe to access stories!</p>
                            <button onclick="subscribeChannel()">Subscribe Now</button>
                        </div>
                    `;
                    list.innerHTML = '';
                    return;
                }

                const response = await fetch(`${API_URL}/api/stories`);
                const stories = await response.json();

                if (stories.length === 0) {
                    list.innerHTML = '<p style="text-align: center;">No stories yet</p>';
                    return;
                }

                list.innerHTML = stories.map(story => `
                    <div class="story-item">
                        <h3>${escapeHtml(story.title)}</h3>
                        <p>${escapeHtml(story.content.substring(0, 100))}...</p>
                        <div class="story-actions">
                            <button class="btn btn-small btn-secondary" onclick="copyToClipboard('${story.id}')">Copy</button>
                            <button class="btn btn-small btn-secondary" onclick="shortenUrl('${story.id}')">Shorten</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                list.innerHTML = '<p style="color: red;">Error loading stories</p>';
            }
        }

        async function uploadStory() {
            const title = document.getElementById('storyTitle').value;
            const content = document.getElementById('storyContent').value;

            if (!title || !content) {
                showMessage('Please fill all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userID, title, content })
                });
                const data = await response.json();

                if (data.success) {
                    showMessage('Story uploaded!', 'success');
                    document.getElementById('storyTitle').value = '';
                    document.getElementById('storyContent').value = '';
                }
            } catch (error) {
                showMessage('Error uploading story', 'error');
            }
        }

        function copyToClipboard(storyId) {
            navigator.clipboard.writeText(`Check this story: ${API_URL}/story/${storyId}`);
            showMessage('Copied!', 'success');
        }

        function saveSettings() {
            const channelLink = document.getElementById('channelLink').value;
            if (!channelLink) {
                showMessage('Enter channel link', 'error');
                return;
            }
            localStorage.setItem('channelLink', channelLink);
            showMessage('Settings saved!', 'success');
        }

        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
  </html>
